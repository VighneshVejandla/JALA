spring:
  application:
    name: JALA

  # The active profile must be supplied per environment, e.g.
  # SPRING_PROFILES_ACTIVE=dev (local) / prod (deployment).
  # No default on purpose: a deployment that forgets to set it
  # fails fast instead of silently booting with dev settings.

  config:
    import: optional:file:.env.properties

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    open-in-view: false
    properties:
      hibernate:
        # Collapses lazy-association loads into IN(...) batches (N+1 guard).
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 30000
      leak-detection-threshold: 60000

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui

  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage-bucket: ${SUPABASE_STORAGE_BUCKET}

app:
  cors:
    # Comma-separated list of allowed browser origins; empty disables CORS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
