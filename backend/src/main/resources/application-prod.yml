#  D:\JALA\backend\src\main\resources\application-prod.yml

spring:

  datasource:
    # Dedicated JDBC URL — deliberately separate from SUPABASE_URL,
    # which is the Supabase REST base used for storage.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false

  flyway:
    enabled: true

server:
  error:
    include-stacktrace: never
    include-message: never

logging:
  level:
    root: INFO
