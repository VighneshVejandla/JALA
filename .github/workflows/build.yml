name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: Sonar needs blame information.
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Unit tests + web slices (Surefire), then integration tests on
      # Testcontainers Postgres (Failsafe), then the JaCoCo >=90% line
      # coverage gate. No external DB or secrets required.
      - name: Test & Verify
        run: ./mvnw -B verify

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            backend/target/*.jar
            backend/target/site/jacoco/
            backend/target/site/jacoco-it/
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          retention-days: 14

      - name: Cache SonarCloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Quality gate blocks the build: analysis waits for the server
      # verdict and fails the job when the gate fails. Skipped on fork
      # PRs (no access to SONAR_TOKEN).
      - name: SonarCloud Analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true
